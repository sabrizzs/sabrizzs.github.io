<!DOCTYPE html>
<html>
<head>
  <title>cd-collage</title>
  <style>
    /* CSS */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #810740;
    }

    button {
      padding: 10px 20px;
      background-color: #d15c96;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    #message {
      margin-top: 20px;
      display: none;
      position: relative;
    }

    #message .cd {
      position: absolute;
    }

    #message img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #downloadButton {
      display: none;
    }
  </style>
  <script>
    /* JavaScript */
    document.addEventListener("DOMContentLoaded", function() {
      var button = document.getElementById("myButton");
      var message = document.getElementById("message");
      var downloadButton = document.getElementById("downloadButton");

      button.addEventListener("click", function() {
        var usernameInput = document.getElementById("usernameInput");
        var username = usernameInput.value;

        var periodSelect = document.getElementById("periodSelect");
        var selectedPeriod = periodSelect.value;

        // check if the user field is filled in
        if (username.trim() === "") {
          message.textContent = "Please enter a valid username!";
          message.style.display = "block";
          return;
        }

        // map selected period values to Last.fm API parameters
        var periodMap = {
          "7days": "7day",
          "1month": "1month",
          "overall": "overall"
        };

        // get time period based on selection
        var selectedPeriodParam = periodMap[selectedPeriod];

        // call Last.fm API and display most listened albums
        var apiKey = "9a164e95c716032bae6b3ae91d8ebd4e";
        var apiUrl = "https://ws.audioscrobbler.com/2.0/?method=user.gettopalbums&user=" + username + "&period=" + selectedPeriodParam + "&limit=11&api_key=" + apiKey + "&format=json";

        fetch(apiUrl)
          .then(response => response.json())
          .then(data => {
            // process API data and display albums in the CD collage
            var albums = data.topalbums.album; // get top albums

            // get the CD elements
            var cdElements = document.getElementsByClassName("cd");

            // loop through the albums and position the images on the CDs
            for (var i = 0; i < albums.length; i++) {
              var album = albums[i];
              var cd = cdElements[i];
              var imageUrl = album.image[3]["#text"] || album.image[4]["#text"] || album.image[2]["#text"];

              // set the position and dimensions of the image based on the vertices
              var vertices = cd.dataset.vertices.split(",");
              var vertices = cd.dataset.vertices.split(",");
              var x1 = parseInt(vertices[0]);
              var y1 = parseInt(vertices[1]);
              var x2 = parseInt(vertices[2]);
              var y2 = parseInt(vertices[3]);
              var x3 = parseInt(vertices[4]);
              var y3 = parseInt(vertices[5]);
              var x4 = parseInt(vertices[6]);
              var y4 = parseInt(vertices[7]);

              var width = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
              var height = Math.sqrt(Math.pow(x4 - x1, 2) + Math.pow(y4 - y1, 2));
              
              cd.innerHTML = "<img src='" + imageUrl + "' alt='" + album.name + "'>";
              cd.style.position = "absolute";
              cd.style.clipPath = "polygon(" + x1 + "px " + y1 + "px, " + x2 + "px " + y2 + "px, " + x3 + "px " + y3 + "px, " + x4 + "px " + y4 + "px)";

              cd.style.width = width + "px";
              cd.style.height = height + "px";
            }

            // show the CD collage and download button
            message.style.display = "block";
            downloadButton.style.display = "block";
          })
          .catch(error => {
            // handle errors
            console.error("Error getting data from Last.fm API:", error);
            message.textContent = "Error getting data from Last.fm.";
            message.style.display = "block";
          });
      });
    });
  </script>
</head>
<body>
  <h1>cd collage</h1>
  <h4>Create a collage of your most listened songs from Last.fm or Spotify!</h4>
  
  <div>
    <!-- add textbox for username -->
    <input type="text" id="usernameInput" placeholder="Your Last.fm username">

    <!-- add time period selection -->
    <select id="periodSelect">
      <option value="7days">Last 7 days</option>
      <option value="1month">Last month</option>
      <option value="overall">Overall</option>
    </select>
  </div>

  <button id="myButton">Submit</button>
  <div id="message">
    <img src="projetoPS.png" alt="Cds on bed" style="width: 1323; height: 1250">
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
  </div>

  <a id="downloadButton" download="collage.png" href="#" style="display: none;">Download Collage</a>

  <p style="font-size: 14px; color:#d15c96">Test #35 by @sabrizzs</p>

</body>
</html>
