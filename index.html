<!DOCTYPE html>
<html>
<head>
  <title>Meu Site</title>
  <style>
    /* Estilos CSS */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 10px 20px;
      background-color: #337ab7;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    #message {
      margin-top: 20px;
      display: none;
    }
  </style>
  <script>
    // Lógica JavaScript
    document.addEventListener("DOMContentLoaded", function() {
      var button = document.getElementById("myButton");
      var message = document.getElementById("message");

      button.addEventListener("click", function() {
        message.textContent = "Ainda não tem nada funcionando >:(";
        message.style.display = "block";
      });
    });
  </script>
</head>
<body>
  <h1>CD Collage</h1>
  <h3>CD Collage is a project that aims to create a platform where users can view personalized collages of their most listened albums in their Last.fm and/or Spotify accounts.</h3>
  <button id="myButton">Comece agora!</button>
  <div id="message"></div>
</body>
</html>
