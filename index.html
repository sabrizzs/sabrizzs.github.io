<!DOCTYPE html>
<html>
<head>
  <title>cd-collage</title>
  <style>
    /* Estilos CSS */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #511531;
    }

    button {
      padding: 10px 20px;
      background-color: #f35091;
      color: #ffffff;
      border: none;
      cursor: pointer;
    }

    #message {
      margin-top: 20px;
      display: none;
    }
  </style>
  <script>
    // Lógica JavaScript
    document.addEventListener("DOMContentLoaded", function() {
      var button = document.getElementById("myButton");
      var message = document.getElementById("message");

      button.addEventListener("click", function() {

        var usernameInput = document.getElementById("usernameInput");
        var username = usernameInput.value;

        // Verificar se o campo de usuário está preenchido
        if (username.trim() === "") {
          message.textContent = "your Last.fm username";
          message.style.display = "block";
          return;
        }

        // Chamar a API do Last.fm e exibir os álbuns mais ouvidos
        var apiKey = "9a164e95c716032bae6b3ae91d8ebd4e";
        var apiUrl = "https://ws.audioscrobbler.com/2.0/?method=user.gettopalbums&user=" + username + "&api_key=" + apiKey + "&format=json";

        fetch(apiUrl)
          .then(response => response.json())
          .then(data => {
            // Processar os dados da API e exibir os álbuns em uma colagem
            var albums = data.topalbums.album;
            var collage = albums.map(album => "<img src='" + album.image[2]["#text"] + "' alt='" + album.name + "'>");
            message.innerHTML = collage.join("");
            message.style.display = "block";
          })
          .catch(error => {
            // Lidar com erros
            console.error("Erro ao obter dados da API do Last.fm:", error);
            message.textContent = "Error getting data. Enter a valid username.";
            message.style.display = "block";
          });
      });
    });
  </script>
</head>
<body>
  <h1>CD Collage</h1>
  <h4>CD Collage is a project that aims to create a platform where users can view personalized collages of their most listened albums in their Last.fm and/or Spotify accounts.</h4>
  <input type="text" id="usernameInput" placeholder="your Last.fm username">
  <button id="myButton">Start now!</button>
  <div id="message"></div>
</body>
</html>
