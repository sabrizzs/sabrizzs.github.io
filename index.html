<!DOCTYPE html>
<html>
<head>
  <title>cd-collage</title>
  <style>
    /* CSS */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #810740;
    }

    button {
      padding: 10px 20px;
      background-color: #d15c96;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    #message {
      margin-top: 20px;
      display: none;
    }

    .cd {
      position: absolute;
      background-color: #ddd;
    }

    .cd img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
  <script>
    /* JavaScript */
    document.addEventListener("DOMContentLoaded", function() {
      var button = document.getElementById("myButton");
      var message = document.getElementById("message");

      button.addEventListener("click", function() {
        var usernameInput = document.getElementById("usernameInput");
        var username = usernameInput.value;

        var periodSelect = document.getElementById("periodSelect");
        var selectedPeriod = periodSelect.value;

        // check if the user field is filled in
        if (username.trim() === "") {
          message.textContent = "Please enter a valid username!";
          message.style.display = "block";
          return;
        }

        // map selected period values to Last.fm API parameters
        var periodMap = {
          "7days": "7day",
          "1month": "1month",
          "overall": "overall"
        };

        // get time period based on selection
        var selectedPeriodParam = periodMap[selectedPeriod];

        // call Last.fm API and display most listened albums
        var apiKey = "9a164e95c716032bae6b3ae91d8ebd4e";
        var apiUrl = "https://ws.audioscrobbler.com/2.0/?method=user.gettopalbums&user=" + username + "&period=" + selectedPeriodParam + "&api_key=" + apiKey + "&format=json";

        fetch(apiUrl)
          .then(response => response.json())
          .then(data => {
            var albums = data.topalbums.album.slice(0, 11); // get the first 11 albums

            // apply album images to CDs based on the provided coordinates
            var cds = document.getElementsByClassName("cd");
            for (var i = 0; i < cds.length; i++) {
              var cd = cds[i];
              var vertices = cd.getAttribute("data-vertices").split(",");

              var album = albums[i];
              var imageUrl = album.image[3]["#text"] || album.image[2]["#text"] || album.image[1]["#text"];

              var bedImage = document.getElementById("bedImage");
              var bedWidth = bedImage.width;
              var bedHeight = bedImage.height;

              var x1 = vertices[0];
              var y1 = vertices[1];
              var x2 = vertices[2];
              var y2 = vertices[3];
              var x3 = vertices[4];
              var y3 = vertices[5];
              var x4 = vertices[6];
              var y4 = vertices[7];

              var img = document.createElement("img");
              img.src = imageUrl;
              img.alt = album.name;
              img.style.clipPath = "polygon(" + x1 + "px " + y1 + "px, " + x2 + "px " + y2 + "px, " + x3 + "px " + y3 + "px, " + x4 + "px " + y4 + "px)";

              cd.appendChild(img);
            }

            // show the collage
            message.style.display = "block";
          })
          .catch(error => {
            console.error("Error getting data from Last.fm API:", error);
            message.textContent = "Error getting data from Last.fm.";
            message.style.display = "block";
          });
      });
    });
  </script>
</head>
<body>
  <h1>cd collage</h1>
  <h4>Create a collage of your most listened songs from Last.fm or Spotify!</h4>
  
  <div>
    <!-- add textbox for username -->
    <input type="text" id="usernameInput" placeholder="Your Last.fm username">

    <!-- add time period selection -->
    <select id="periodSelect">
      <option value="7days">Last 7 days</option>
      <option value="1month">Last month</option>
      <option value="overall">Overall</option>
    </select>
  </div>

  <button id="myButton">Submit</button>

  <div id="message">
    <img id="bedImage" src="projetoPS.png" alt="Bed Image" style="width: 1323; height: 1250">>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <div class="cd" data-vertices="533,449,411,643,733,649,611,843"></div>
    <!-- Add more "cd" divs for each CD on the bed -->
  </div>

  <p style="font-size: 14px; color:#d15c96">Test #38 by @sabrizzs</p>

</body>
</html>
