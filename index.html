<html>
<head>
  <title>Meu Site</title>

    /* Estilos CSS */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #810740;
    }

    button {
      padding: 10px 20px;
      background-color: #d15c96;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    #message {
      margin-top: 20px;
      display: none;
    }
  </style>
