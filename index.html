<!DOCTYPE html>
<html>
<head>
  <title>cd-collage</title>
  <style>
    /*CSS*/
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #810740;
    }

    button {
      padding: 10px 20px;
      background-color: #d15c96;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    #message {
      margin-top: 20px;
      display: none;
    }
  </style>
  <script>
    /*JavaScript*/
    document.addEventListener("DOMContentLoaded", function() {
      var button = document.getElementById("myButton");
      var message = document.getElementById("message");

      button.addEventListener("click", function() {
        var usernameInput = document.getElementById("usernameInput");
        var username = usernameInput.value;

        var sizeSelect = document.getElementById("sizeSelect");
        var selectedSize = sizeSelect.value;

        var periodSelect = document.getElementById("periodSelect");
        var selectedPeriod = periodSelect.value;

        //Check if the user field is filled in
        if (username.trim() === "") {
          message.textContent = "please, enter a valid username!";
          message.style.display = "block";
          return;
        }

        //Map selected size values ​​to number of rows and columns
        var sizeMap = {
          "3x3": { rows: 3, cols: 3 },
          "5x5": { rows: 5, cols: 5 },
          "10x10": { rows: 10, cols: 10 }
        };

        //Get number of rows and columns based on selected size
        var selectedSizeData = sizeMap[selectedSize];
        var rows = selectedSizeData.rows;
        var cols = selectedSizeData.cols;

        //Map selected period values ​​to Last.fm API parameters
        var periodMap = {
          "7days": "7day",
          "1month": "1month",
          "overall": "overall"
        };

        //Get time period based on selection
        var selectedPeriodParam = periodMap[selectedPeriod];

        //Call Last.fm API and display most listened albums
        var apiKey = "9a164e95c716032bae6b3ae91d8ebd4e";
        var apiUrl = "https://ws.audioscrobbler.com/2.0/?method=user.gettopalbums&user=" + username + "&period=" + selectedPeriodParam + "&api_key=" + apiKey + "&format=json";

        fetch(apiUrl)
          .then(response => response.json())
          .then(data => {
            //Process API data and display albums in a collage
            var albums = data.topalbums.album.slice(0, rows * cols); // Limitar o número de álbuns com base no tamanho selecionado
            var collage = albums.map(album => "<img src='" + album.image[2]["#text"] + "' alt='" + album.name + "'>");

            //Set the CSS style for the collage
            var collageStyle = "display: grid; grid-template-columns: repeat(" + cols + ", 1fr); grid-gap: 10px;";

            //Create the HTML structure of the collage
            var collageHtml = "";
            for (var i = 0; i < collage.length; i++) {
              collageHtml += "<div>" + collage[i] + "</div>";
            }

            //View album collage and apply style
            message.innerHTML = collageHtml;
            message.style.display = "block";
            message.style.cssText = collageStyle;
          })
          .catch(error => {
            //Deal with errors
            console.error("Erro ao obter dados da API do Last.fm:", error);
            message.textContent = "Error getting data from Last.fm.";
            message.style.display = "block";
          });
      });
    });
  </script>
</head>
<body>
  <h1>CD Collage</h1>
  <h4>CD Collage is a project that aims to create a platform where users can view personalized collages of their most listened albums in their Last.fm and/or Spotify accounts.</h4>
  
  <div>
    <!-- Add textbox for username -->
    <input type="text" id="usernameInput" placeholder="your last.fm username">

    <!-- Add collage size selection -->
    <select id="sizeSelect">
      <option value="3x3">3x3</option>
      <option value="5x5">5x5</option>
      <option value="10x10">10x10</option>
    </select>

    <!-- Add time period selection -->
  
    <select id="periodSelect">
      <option value="7days">last 7 days</option>
      <option value="1month">last month</option>
      <option value="overall">overall</option>
    </select>
  </div>

  <button id="myButton">submit</button>

  <div id="message"></div>

  <p style="font-size: 14px; color:#d15c96">@sabrizzs</p>

</body>
</html>
